name: Add-on Release

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Publish (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - aarch64
          - armv7
          - armhf
          - i386

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read add-on version
        id: version
        run: |
          config_version="$(sed -n 's/^version:[[:space:]]*"\{0,1\}\([^\"]*\)"\{0,1\}$/\1/p' nfs-ganesha/config.yaml | head -n1)"

          if [ -z "${config_version}" ]; then
            echo "Unable to read version from nfs-ganesha/config.yaml" >&2
            exit 1
          fi

          echo "version=${config_version}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve target platform
        id: platform
        run: |
          case "${{ matrix.arch }}" in
            amd64) echo "platform=linux/amd64" >> "${GITHUB_OUTPUT}" ;;
            aarch64) echo "platform=linux/arm64" >> "${GITHUB_OUTPUT}" ;;
            armv7) echo "platform=linux/arm/v7" >> "${GITHUB_OUTPUT}" ;;
            armhf) echo "platform=linux/arm/v6" >> "${GITHUB_OUTPUT}" ;;
            i386) echo "platform=linux/386" >> "${GITHUB_OUTPUT}" ;;
            *)
              echo "Unsupported arch: ${{ matrix.arch }}" >&2
              exit 1
              ;;
          esac

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push add-on image
        uses: docker/build-push-action@v7
        with:
          context: ./nfs-ganesha
          file: ./nfs-ganesha/Dockerfile
          platforms: ${{ steps.platform.outputs.platform }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-addon-nfs-ganesha:${{ steps.version.outputs.version }}

