name: Add-on CI

on:
  pull_request:
    paths:
      - .github/dependabot.yml
      - .github/workflows/addon-*.yml
      - nfs-ganesha/**
  push:
    branches:
      - main
    paths:
      - .github/dependabot.yml
      - .github/workflows/addon-*.yml
      - nfs-ganesha/**

permissions:
  contents: read

jobs:
  addon-check:
    name: Add-on Checker
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run add-on checker
        uses: frenck/action-addon-linter@v2
        with:
          path: ./nfs-ganesha

  build:
    name: Build (${{ matrix.arch }})
    needs: addon-check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
          - arch: armv7
            platform: linux/arm/v7
          - arch: armhf
            platform: linux/arm/v6
          - arch: i386
            platform: linux/386

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build add-on image
        uses: docker/build-push-action@v7
        with:
          context: ./nfs-ganesha
          file: ./nfs-ganesha/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          tags: local/nfs-ganesha:${{ matrix.arch }}-test
